<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>З Днем Батька!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #06010f; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

  #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

  .page {
    position: relative; z-index: 1;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
    gap: 36px;
  }

  /* SLIDER */
  .slider-wrap { width: 100%; max-width: 360px; }
  .hint {
    text-align: center; font-size: 12px; letter-spacing: 2.5px;
    text-transform: uppercase; color: rgba(255,200,100,0.5);
    font-family: 'Playfair Display', serif;
    margin-bottom: 14px;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:.35} 50%{opacity:1} }

  .track {
    position: relative; width: 100%; height: 64px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,180,50,0.18);
    border-radius: 32px;
    touch-action: none; overflow: hidden;
  }
  .track-fill {
    position: absolute; top: 0; left: 0; height: 100%; width: 0;
    background: linear-gradient(90deg,#6a2000,#cc5500,#ff9000,#ffd000);
    border-radius: 32px; pointer-events: none;
  }
  .thumb {
    position: absolute; top: 0; left: 0;
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffb020, #ff4400);
    border: 2px solid rgba(255,220,100,0.65);
    display: flex; align-items: center; justify-content: center;
    cursor: grab; z-index: 5; touch-action: none;
    box-shadow: 0 0 22px rgba(255,120,0,.65), 0 0 44px rgba(255,60,0,.25);
  }
  .thumb svg { pointer-events: none; }

  /* CARD */
  .card-wrap {
    width: 100%; max-width: 360px;
    opacity: 0; transform: scale(0.9) translateY(24px);
    transition: opacity .6s cubic-bezier(.2,.8,.3,1), transform .6s cubic-bezier(.2,.8,.3,1);
    pointer-events: none;
  }
  .card-wrap.show { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

  .card {
    border-radius: 28px;
    border: 1.5px solid rgba(255,200,70,0.2);
    background: rgba(10,4,22,0.55);
    backdrop-filter: blur(2px);
    padding: 48px 32px 52px;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }

  .label {
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,180,60,0.5);
  }

  .big-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 12vw, 52px);
    font-weight: 900;
    color: #ffe8a0;
    line-height: 1.1;
    text-shadow: 0 0 60px rgba(255,150,0,.5), 0 0 120px rgba(255,80,0,.2);
  }

  .heart {
    font-size: 28px; color: #ff4040;
    animation: hb 1.5s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes hb {
    0%,100%{transform:scale(1)} 15%{transform:scale(1.35)} 30%{transform:scale(1)} 45%{transform:scale(1.18)} 60%{transform:scale(1)}
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="page">

  <div class="slider-wrap">
    <div class="hint">Тягни вправо &rarr;</div>
    <div class="track" id="track">
      <div class="track-fill" id="fill"></div>
      <div class="thumb" id="thumb">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
          <polyline points="15 18 21 12 15 6"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card">
      <div class="label">для найкращого тата</div>
      <div class="big-text">З Днем<br>Батька!</div>
      <div class="heart">&#10084;</div>
    </div>
  </div>

</div>

<script>
(function(){
  const cv = document.getElementById('bg');
  const cx = cv.getContext('2d');
  let W, H, stars=[], embers=[];

  function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
  resize();
  window.addEventListener('resize',()=>{ resize(); initStars(); });

  function initStars(){
    stars=[];
    for(let i=0;i<200;i++) stars.push({x:Math.random()*W,y:Math.random()*H*0.7,r:Math.random()*1.6+0.2,a:Math.random(),da:(Math.random()-.5)*.014});
  }
  initStars();

  function spawnEmber(){
    if(Math.random()<.4) embers.push({x:W*(.1+Math.random()*.35),y:H*.63,vx:(Math.random()-.5)*1.5,vy:-(1.4+Math.random()*2.4),life:1,r:1+Math.random()*2.5});
  }

  let t=0;
  function draw(){
    t+=.016;
    const sky=cx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#02000a'); sky.addColorStop(.5,'#0c0216'); sky.addColorStop(.72,'#1c0700'); sky.addColorStop(1,'#061404');
    cx.fillStyle=sky; cx.fillRect(0,0,W,H);

    stars.forEach(s=>{ s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1; cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fillStyle=`rgba(255,228,170,${s.a.toFixed(2)})`; cx.fill(); });

    const mx=W*.82, my=58;
    [32,.06],[22,.1],[13,.9].forEach(([r,a])=>{ cx.beginPath(); cx.arc(mx,my,r,0,Math.PI*2); cx.fillStyle=`rgba(255,248,210,${a})`; cx.fill(); });

    const hy=H*.63;
    cx.beginPath(); cx.moveTo(0,hy);
    for(let x=0;x<=W;x+=3) cx.lineTo(x,hy+Math.sin(x*.035+t)*4+Math.sin(x*.08)*2);
    cx.lineTo(W,H); cx.lineTo(0,H); cx.closePath(); cx.fillStyle='#060f04'; cx.fill();

    [W*.12,W*.2,W*.28].forEach((fx,i)=>{
      const fh=26+Math.sin(t*3.5+i*1.3)*9;
      const fg=cx.createRadialGradient(fx,hy,0,fx,hy-fh,fh*1.4);
      fg.addColorStop(0,'rgba(255,215,0,.95)'); fg.addColorStop(.35,'rgba(255,75,0,.8)'); fg.addColorStop(1,'rgba(200,10,0,0)');
      cx.beginPath(); cx.ellipse(fx,hy-fh*.45,7+Math.sin(t*5+i)*2,fh*.55,0,0,Math.PI*2); cx.fillStyle=fg; cx.fill();
    });

    const tx=W*.75;
    cx.save(); cx.translate(tx,hy);
    cx.fillStyle='#183510'; cx.beginPath(); cx.roundRect(-34,-26,54,26,5); cx.fill();
    cx.fillStyle='#22521a'; cx.beginPath(); cx.roundRect(12,-36,28,22,4); cx.fill();
    cx.fillStyle='rgba(140,205,235,.22)'; cx.beginPath(); cx.roundRect(-32,-34,23,17,3); cx.fill();
    cx.fillStyle='#0c1807';
    cx.beginPath(); cx.arc(-16,5,16,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(22,3,10,0,Math.PI*2); cx.fill();
    cx.restore();

    spawnEmber();
    embers=embers.filter(e=>e.life>0);
    embers.forEach(e=>{ e.x+=e.vx; e.y+=e.vy; e.vy*=.986; e.life-=.018; cx.beginPath(); cx.arc(e.x,e.y,e.r,0,Math.PI*2); cx.fillStyle=`rgba(255,${Math.floor(140+e.life*80)},0,${e.life.toFixed(2)})`; cx.fill(); });

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script>
(function(){
  const track=document.getElementById('track');
  const fill=document.getElementById('fill');
  const thumb=document.getElementById('thumb');
  const card=document.getElementById('cardWrap');
  const TW=64;
  let drag=false, sx=0, sl=0, done=false;

  function max(){ return track.offsetWidth-TW; }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  function move(px){
    const m=max(), p=clamp(px,0,m);
    thumb.style.left=p+'px';
    fill.style.width=(p+TW*.5)+'px';
    if(p/m>=.88&&!done){ done=true; thumb.style.left=m+'px'; fill.style.width='100%'; card.classList.add('show'); }
  }

  function snap(){ if(done) return; thumb.style.transition='left .3s ease'; fill.style.transition='width .3s ease'; thumb.style.left='0'; fill.style.width='0'; setTimeout(()=>{ thumb.style.transition=''; fill.style.transition=''; },320); }

  thumb.addEventListener('touchstart',e=>{ if(done) return; drag=true; sx=e.touches[0].clientX; sl=thumb.offsetLeft; e.preventDefault(); },{passive:false});
  document.addEventListener('touchmove',e=>{ if(!drag) return; move(sl+e.touches[0].clientX-sx); e.preventDefault(); },{passive:false});
  document.addEventListener('touchend',()=>{ if(!drag) return; drag=false; snap(); });

  thumb.addEventListener('mousedown',e=>{ if(done) return; drag=true; sx=e.clientX; sl=thumb.offsetLeft; e.preventDefault(); });
  document.addEventListener('mousemove',e=>{ if(!drag) return; move(sl+e.clientX-sx); });
  document.addEventListener('mouseup',()=>{ if(!drag) return; drag=false; snap(); });
})();
</script>

</body>
</html>
